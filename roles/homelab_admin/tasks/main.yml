---
# Shared admin user for homelab operations and Twingate SSH gateway upstream auth.
# Ansible still connects as the per-host user from inventory (leader01, follower01, …).
- name: Ensure homelab admin group exists
  ansible.builtin.group:
    name: "{{ homelab_admin_group }}"
    state: present

- name: Create homelab admin user
  ansible.builtin.user:
    name: "{{ homelab_admin_user }}"
    groups: "{{ homelab_admin_group }}"
    append: true
    shell: /bin/bash
    create_home: true
    state: present

# Static pubkey is bootstrap-only. With gateway SSH CA trust, snuffy@*.ssh uses cert auth.
# Set homelab_admin_install_ssh_pubkey: true only for first bootstrap before CA is on the node.
- name: Manage SSH public key for homelab admin
  ansible.posix.authorized_key:
    user: "{{ homelab_admin_user }}"
    state: "{{ 'present' if homelab_admin_install_ssh_pubkey | bool else 'absent' }}"
    key: "{{ lookup('file', homelab_admin_ssh_pubkey_file) }}"
    comment: "homelab admin (ansible)"
  when: homelab_admin_install_ssh_pubkey | bool or homelab_admin_remove_static_ssh_pubkey | default(true) | bool

- name: Passwordless sudo for homelab admin
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ homelab_admin_user }}"
    content: "{{ homelab_admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s
