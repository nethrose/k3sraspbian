---
# Run after Flux has deployed the Twingate gateway with SSH enabled (auto-generated User CA).
# Fetches the gateway User CA public key from cluster logs and configures sshd on every Pi.
- name: Fetch Twingate gateway User CA public key from cluster
  delegate_to: localhost
  run_once: true
  become: false
  block:
    - name: Resolve gateway pod name
      ansible.builtin.command:
        cmd: >
          kubectl get pods -n {{ twingate_namespace }}
          -l app.kubernetes.io/name=gateway,app.kubernetes.io/instance={{ gateway_helm_release }}
          -o jsonpath={.items[0].metadata.name}
      register: twingate_gateway_pod
      changed_when: false
      failed_when: twingate_gateway_pod.stdout | length == 0

    - name: Extract User CA public key from gateway logs
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl logs -n "{{ twingate_namespace }}" "{{ twingate_gateway_pod.stdout }}" --tail=2000 2>/dev/null \
          | grep -oE 'ssh-(ed25519|rsa) [A-Za-z0-9+/][A-Za-z0-9+/=]*' \
          | tail -1
      register: twingate_gateway_user_ca
      changed_when: false
      failed_when: twingate_gateway_user_ca.stdout | length == 0

    - name: Validate extracted SSH public key
      ansible.builtin.command:
        cmd: ssh-keygen -l -f /dev/stdin
      args:
        stdin: "{{ twingate_gateway_user_ca.stdout }}\n"
      changed_when: false

    - name: Store gateway User CA for cluster nodes
      ansible.builtin.set_fact:
        twingate_gateway_user_ca_pubkey: "{{ twingate_gateway_user_ca.stdout }}"
      delegate_facts: true

- name: Install gateway User CA on nodes
  ansible.builtin.copy:
    dest: "{{ twingate_sshd_trusted_user_ca_keys_path }}"
    content: "{{ hostvars['localhost']['twingate_gateway_user_ca_pubkey'] }}\n"
    owner: root
    group: root
    mode: "0644"

- name: Configure sshd to trust Twingate gateway User CA
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/twingate-gateway.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible (twingate-ssh-sshd.yml). Trust certs signed by the Twingate gateway User CA.
      TrustedUserCAKeys {{ twingate_sshd_trusted_user_ca_keys_path }}
  notify: reload sshd
