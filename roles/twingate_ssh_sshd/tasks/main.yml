---
# Trust the Twingate gateway SSH User CA on every node.
#
# The CA is now a PERSISTENT, manual CA (gateway HelmRelease ssh.ca.manual.existingSecret),
# so its public key is a known, stable value supplied out-of-band via
# `twingate_gateway_user_ca_pubkey` (group_vars or -e) — the same key registered with
# Twingate as the SSH CA. This replaces the old approach of scraping the auto-generated CA
# out of gateway pod logs (fragile: it rotated on every pod restart and needed cluster access).
# Generate the key with k3s-gitops `scripts/gen-gateway-cas.sh`.
- name: Assert gateway User CA public key is configured
  ansible.builtin.assert:
    that:
      - twingate_gateway_user_ca_pubkey is defined
      - twingate_gateway_user_ca_pubkey | trim | length > 0
      - twingate_gateway_user_ca_pubkey is match('^(ssh-ed25519|ssh-rsa|ecdsa-sha2-nistp[0-9]+) ')
    fail_msg: >-
      twingate_gateway_user_ca_pubkey is not set. Paste the gateway SSH CA public key
      (ssh_ca.pub from k3s-gitops scripts/gen-gateway-cas.sh) into group_vars/all.yml
      or pass it with -e twingate_gateway_user_ca_pubkey="ssh-ed25519 AAAA...".

- name: Install gateway User CA on nodes
  ansible.builtin.copy:
    dest: "{{ twingate_sshd_trusted_user_ca_keys_path }}"
    content: "{{ twingate_gateway_user_ca_pubkey | trim }}\n"
    owner: root
    group: root
    mode: "0644"
  notify: reload sshd

- name: Configure sshd to trust Twingate gateway User CA
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/twingate-gateway.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible (twingate-ssh-sshd.yml). Trust certs signed by the Twingate gateway User CA.
      TrustedUserCAKeys {{ twingate_sshd_trusted_user_ca_keys_path }}
  notify: reload sshd
