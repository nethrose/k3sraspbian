---
# Configure Pi sshd to trust the Twingate gateway SSH User CA.
# Prerequisites:
#   - site.yml completed (homelab admin user snuffy exists)
#   - Flux bootstrapped; twingate-operator HelmRelease reconciled with gateway.ssh.enabled
#   - KUBECONFIG pointing at the cluster (e.g. ~/.kube/k3s-rbps.yaml)
#   - kubectl in PATH on the machine running Ansible
#
# Usage:
#   export KUBECONFIG=~/.kube/k3s-rbps.yaml
#   ansible-playbook -i inventory/my-cluster/hosts.yml twingate-ssh-sshd.yml

- hosts: k3s_cluster
  become: true
  roles:
    - role: twingate_ssh_sshd
