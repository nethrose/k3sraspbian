---
# CM3588 NAS (OpenMediaVault): homelab admin user + Twingate gateway SSH User CA trust.
# Prerequisites:
#   - SSH as OMV admin (inventory homelab_nas ansible_user, default admin)
#   - Flux gateway with gateway.ssh.enabled; KUBECONFIG on the Ansible control machine
#
# Usage:
#   export KUBECONFIG=~/.kube/k3s-rbps.yaml
#   ansible-playbook -i inventory/my-cluster/hosts.yml homelab-nas.yml --ask-become-pass
#
# After this: ssh <homelab_admin_user>@jellyfin.ssh via Twingate (SSH resource in your GitOps repo).

- hosts: homelab_nas
  become: true
  roles:
    - role: homelab_admin
    - role: twingate_ssh_sshd
