---
# Used only when k3s_use_latest_version is false (rollback / testing).
k3s_version: v1.31.0+k3s1
k3s_use_latest_version: true
# Modern Pi OS (kernel 6.18+) is nftables-only; leave false unless ip_tables.ko exists.
k3s_use_iptables_legacy: false
systemd_dir: /etc/systemd/system
master_ip: "{{ hostvars[groups['k3sleaders'][0]]['ansible_default_ipv4']['address'] }}"
extra_server_args: ""
extra_agent_args: ""

# Shared homelab admin (Twingate SSH gateway upstream user; must match gateway.ssh.gateway.username in your GitOps repo).
homelab_admin_user: snuffy
homelab_admin_group: sudo
homelab_admin_ssh_pubkey_file: "{{ lookup('env', 'HOME') }}/.ssh/id_rsa.pub"
# false = rely on Twingate gateway SSH CA (cert auth). true only for initial bootstrap.
homelab_admin_install_ssh_pubkey: false

twingate_sshd_trusted_user_ca_keys_path: /etc/ssh/twingate-gateway-user-ca.pub
# Public key of the gateway's manual SSH User CA (ssh_ca.pub from k3s-gitops
# scripts/gen-gateway-cas.sh; the same key registered with Twingate as the SSH CA).
# Public key only — never put the private key here. Override per-run with -e if preferred.
twingate_gateway_user_ca_pubkey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDG+162gLMwxw3zrVNwHMpk42+p01EVHYkkPdpBlYuOr twingate-gateway-ca"
